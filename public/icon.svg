    <polygon points="400,140 403,131 406,140 415,143 406,146 403,155 400,146 391,143" />
    <polygon points="380,260 383,251 386,260 395,263 386,266 383,275 380,266 371,263" />
    <polygon points="120,250 123,243 126,250 133,253 126,256 123,263 120,256 113,253" />
