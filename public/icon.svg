  <rect x="230" y="260" width="12" height="4" rx="2" fill="#00b894" transform="rotate(20 236 262)"/>
  <rect x="270" y="248" width="12" height="4" rx="2" fill="#6c5ce7" transform="rotate(-15 276 250)"/>
  <rect x="310" y="258" width="12" height="4" rx="2" fill="#fdcb6e" transform="rotate(35 316 260)"/>
  <rect x="160" y="310" width="12" height="4" rx="2" fill="#00b894" transform="rotate(25 166 312)"/>
  <rect x="210" y="320" width="12" height="4" rx="2" fill="#e17055" transform="rotate(-20 216 322)"/>
  <rect x="260" y="308" width="12" height="4" rx="2" fill="#6c5ce7" transform="rotate(40 266 310)"/>
  <rect x="310" y="318" width="12" height="4" rx="2" fill="#fdcb6e" transform="rotate(-30 316 320)"/>
  <rect x="350" y="310" width="12" height="4" rx="2" fill="#e17055" transform="rotate(15 356 312)"/>

