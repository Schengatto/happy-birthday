<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ff6b9d"/>
      <stop offset="100%" style="stop-color:#c44569"/>
    </linearGradient>
    <linearGradient id="icing" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#fff5f5"/>
      <stop offset="100%" style="stop-color:#ffe0e6"/>
    </linearGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="256" cy="256" r="256" fill="url(#bg)"/>

  <!-- Cake base bottom layer -->
  <rect x="116" y="290" width="280" height="80" rx="16" fill="#f8c291"/>
  <rect x="116" y="290" width="280" height="20" rx="8" fill="#e77f67"/>

  <!-- Cake middle layer -->
  <rect x="140" y="230" width="232" height="70" rx="14" fill="#ffeaa7"/>
  <rect x="140" y="230" width="232" height="18" rx="8" fill="#fdcb6e"/>

  <!-- Cake top layer -->
  <rect x="168" y="178" width="176" height="62" rx="12" fill="#dfe6e9"/>

  <!-- Icing drips -->
  <path d="M168 190 Q168 178 180 178 L332 178 Q344 178 344 190 L344 195 Q338 215 330 200 Q322 215 314 198 Q306 218 298 200 Q290 216 282 198 Q274 220 266 200 Q258 215 250 198 Q242 218 234 200 Q226 215 218 198 Q210 218 202 200 Q194 215 186 198 Q178 215 168 195Z" fill="url(#icing)"/>

